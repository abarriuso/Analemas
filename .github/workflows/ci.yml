name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # ── Validación científica (regresión orbital) ──
      - name: Validación astronómica
        run: node validacion.mjs

      # ── Smoke test (load-time runtime errors) ──
      - name: Smoke test
        run: node smoke-test.cjs

      # ── ESLint ──
      - name: Lint JavaScript
        run: npm run lint:js

      # ── HTML Validate ──
      - name: Lint HTML
        run: npm run lint:html

      # ── Stylelint ──
      - name: Lint CSS
        run: npm run lint:css

      # ── Lighthouse CI ──
      - name: Lighthouse CI
        run: npx lhci autorun

  deploy:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
